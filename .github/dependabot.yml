version: 2
updates:
  # Keep workflow action SHAs (pinned to defeat tag-hijack supply-chain
  # attacks) updated. Dependabot recognises the `# v1.2.3` comment next to
  # each pinned SHA and bumps both together when a new release ships.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "cargo"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "cargo"
    directory: "/web-dashboard"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # vico compose-m3 is pinned at 2.0.0-beta.3. Two reasons to hold: (1) 3.x is
    # a charting-API rewrite (SleepChart.kt — core.* package + builders renamed);
    # (2) even the 2.5.x MINORS now require compileSdk 37 + AGP 9.1 (they fail
    # checkDebugAarMetadata on AGP 8). Ignore minor+major until the AGP 9
    # migration; delete this entry then. Patch within 2.0.x still flows.
    ignore:
      - dependency-name: "com.patrykandpatrick.vico:compose-m3"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      # Kotlin, KSP and AGP move as one toolchain. Held at the 2.2.x line until
      # the deliberate AGP 9 / Kotlin 2.3 migration (2.3+ needs newer KSP + AGP
      # than the plugin ecosystem currently ships). Bumped as its own task, not
      # via Dependabot — delete these two entries when starting that migration.
      # Patch bumps within 2.2.x still flow.
      - dependency-name: "org.jetbrains.kotlin.android"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "com.google.devtools.ksp"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      # androidx.lifecycle 2.11+ requires compileSdk 37 + AGP 9.1 (its AAR
      # metadata fails checkDebugAarMetadata on AGP 8) — the same AGP-9 wall as
      # the Kotlin/KSP toolchain above. Hold all lifecycle artifacts at 2.10.x
      # until the AGP 9 migration; lift alongside the toolchain bump.
      - dependency-name: "androidx.lifecycle:*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      # androidx.core 1.19+ also requires compileSdk 37 + AGP 9.1 (same wall).
      # Hold core/core-ktx at 1.18.x until the AGP 9 migration.
      - dependency-name: "androidx.core:*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      # The Gradle wrapper: 9.x is incompatible with AGP 8.x (AGP relies on a
      # Gradle internal API removed in Gradle 9.6.0). Hold on 8.x until the AGP 9
      # migration. Dependabot has named the wrapper both ways, so pin both.
      - dependency-name: "gradle-wrapper"
        update-types: ["version-update:semver-major"]
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/web-landing"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # eslint is pinned at ^9: eslint 10 breaks eslint-config-next's bundled
    # eslint-plugin-react (calls the removed context.getFilename()). Ignore MAJOR
    # bumps until eslint-config-next supports eslint 10; delete this entry then.
    # Only the `eslint` core package is pinned — configs/plugins still update.
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # @types/node tracks the Node runtime we build + deploy on (Node 20 in the
      # CI runners and the deploy toolchain). Don't let the type defs run ahead
      # of the runtime major — pin to 20.x; bump alongside an actual Node upgrade.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
