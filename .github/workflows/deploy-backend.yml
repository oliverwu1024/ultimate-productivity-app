name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

# Serialize backend deploys per branch. Without this, two backend-touching
# commits landing within ~90s can race in ECS — the second deployment arrives
# before the first stabilizes and the circuit breaker rolls one back. With
# `cancel-in-progress: true`, the in-flight deploy is cancelled when a newer
# commit lands, so the latest commit always wins.
concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  ECR_REPO: ultiq/backend
  ECS_CLUSTER: ultiq
  ECS_SERVICE: backend-service
  ECS_TASK_DEF_FAMILY: ultiq-backend
  CONTAINER_NAME: backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to commit SHAs (not tags) so a hijacked
      # publisher account can't move a tag to a malicious commit and ride into
      # this workflow's deploy IAM role. Update via Dependabot.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Build and push image
        id: build
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Snapshot current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_TASK_DEF_FAMILY }}" \
            --query taskDefinition > task-def.json

      - name: Render new task definition with new image
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@138c24f321fdbdf7edee4a685519d253cae2cdea # v1.9.0
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}
          # §9.8 — Daily anomaly scan is opt-in. Setting these here keeps the
          # config in source control (rather than hand-edited in the AWS
          # console where it drifts). The scheduler is off by default in
          # `scheduler::spawn`, so missing the env var means "no scan".
          #
          # CAUTION: ANOMALY_SCHEDULER_ENABLED=true on every task assumes the
          # service runs a single task. If `desired_count` ever bumps >1,
          # split this off (one task with the env var, the rest without) or
          # switch to EventBridge → Lambda — otherwise the scan double-fires
          # and double-bills Bedrock.
          environment-variables: |
            ANOMALY_SCHEDULER_ENABLED=true
            ANOMALY_SCAN_HOUR_UTC=22
            AI_CHAT_TOOLS_ENABLED=true
            SLEEP_AUDIO_S3_BUCKET=ultiq-sleep-audio

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@c465972ecbd160473f22e683363b422a5412a3de # v2.6.3
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
