name: Deploy web dashboard

on:
  push:
    branches: [main]
    paths:
      - 'web-dashboard/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  S3_BUCKET: ultiq-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-dashboard
    steps:
      # Pin actions to commit SHAs to defend against tag-hijack supply-chain
      # attacks against this workflow's deploy IAM role. dtolnay/rust-toolchain
      # has no versioned tags — pin to a branch-tip SHA and bump on review.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + target
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            web-dashboard/target
          key: web-dashboard-${{ runner.os }}-cargo-${{ hashFiles('web-dashboard/Cargo.lock') }}
          restore-keys: |
            web-dashboard-${{ runner.os }}-cargo-

      - name: Install Trunk
        run: cargo install --locked --version 0.21.14 trunk

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-dashboard/package-lock.json

      - run: npm ci

      - name: Build (release, prod API)
        env:
          API_BASE_URL: https://api.ultiqapp.com
        run: trunk build --release

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets to S3 (1-year immutable cache)
        run: |
          aws s3 sync dist/ s3://${S3_BUCKET}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

      - name: Upload index.html (short cache)
        run: |
          aws s3 cp dist/index.html s3://${S3_BUCKET}/index.html \
            --cache-control "public, max-age=0, no-cache" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_WEB_DIST_ID }}" \
            --paths "/" "/index.html"
