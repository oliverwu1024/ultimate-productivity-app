name: CI

# PR-validation pipeline. Complements the deploy-*.yml workflows (which run on
# push to main): this runs BEFORE merge so broken builds, i18n regressions, and
# leaked secrets can't land. One path-filtered job per surface (mirroring the
# deploy path filters) + a single `ci-success` aggregation gate that branch
# protection marks required — so path-filtered skips never hang the check.
#
# Action SHAs are pinned (Dependabot's github-actions group bumps SHA+comment
# together), matching the deploy-*.yml supply-chain convention.

on:
  pull_request:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ---- change detection (mirrors the deploy-*.yml path filters) ----
  changes:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      backend: ${{ steps.filter.outputs.backend }}
      web_dashboard: ${{ steps.filter.outputs.web_dashboard }}
      web_landing: ${{ steps.filter.outputs.web_landing }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            web_dashboard:
              - 'web-dashboard/**'
              - '.github/workflows/ci.yml'
            web_landing:
              - 'web-landing/**'
              - 'scripts/i18n-web-check.sh'
              - '.github/workflows/ci.yml'

  # ---- Android (Kotlin/Compose) ----
  android:
    needs: changes
    if: ${{ needs.changes.outputs.android == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      # google-services.json is gitignored (real Firebase project/app IDs). The
      # Gradle plugin only validates JSON structure + package_name at build time —
      # it never contacts Firebase — so a committed stub with both applicationIds
      # (com.ultiq.app + .debug) suffices; FCM isn't exercised in CI. Temurin 17
      # bundles jlink, so the local JAVA_HOME=/opt/android-studio/jbr hack is unused.
      - name: Provision build-only google-services.json
        run: cp ci/google-services.stub.json app/google-services.json
      # Hard gate: app must assemble, and Lint must find NO NEW i18n issues beyond
      # the committed lint-baseline.xml (MissingTranslation/StringFormat*/… as errors).
      - name: assembleDebug + lintDebug
        run: ./gradlew :app:assembleDebug :app:lintDebug --no-daemon

  # ---- Backend (Rust/Axum). sqlx 0.9 uses RUNTIME queries (no query! macro) ⇒
  #      no DATABASE_URL / SQLX_OFFLINE / Postgres service needed. ----
  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: backend-${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: backend-${{ runner.os }}-cargo-
      # Advisory (known backlog — flip to blocking once triaged; see PR #1 notes).
      - name: rustfmt (advisory)
        continue-on-error: true
        run: cargo fmt --all --check
      - name: clippy (advisory)
        continue-on-error: true
        run: cargo clippy --all-targets --all-features -- -D warnings
      # Hard gate: the crate must compile against the committed lockfile.
      - name: build (--locked)
        run: cargo build --locked
      - name: cargo audit (advisory)
        continue-on-error: true
        run: |
          cargo install --locked cargo-audit || true
          cargo audit

  # ---- Web dashboard (Leptos/WASM). Mirrors deploy-web.yml toolchain. ----
  web-dashboard:
    needs: changes
    if: ${{ needs.changes.outputs.web_dashboard == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-dashboard
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            web-dashboard/target
          key: web-dashboard-${{ runner.os }}-cargo-${{ hashFiles('web-dashboard/Cargo.lock') }}
          restore-keys: web-dashboard-${{ runner.os }}-cargo-
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-dashboard/package-lock.json
      - run: npm ci
      - name: rustfmt (advisory)
        continue-on-error: true
        run: cargo fmt --all --check
      # clippy on the wasm target so it sees the same cfg as the real build.
      - name: clippy (advisory)
        continue-on-error: true
        run: cargo clippy --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: Install Trunk (pinned to deploy version)
        run: cargo install --locked --version 0.21.14 trunk
      # Hard gate: the WASM app must build.
      - name: trunk build
        run: trunk build
      # Hard gate: pure-logic unit tests (the i18n contract — tag mapping,
      # fallback chain, placeholder substitution, catalog parity) run on the
      # host target; they need no browser/WASM runtime.
      - name: cargo test (host)
        run: cargo test --target x86_64-unknown-linux-gnu --locked
      - name: cargo audit (advisory)
        continue-on-error: true
        run: |
          cargo install --locked cargo-audit || true
          cargo audit

  # ---- Web landing (Next.js 16) ----
  web-landing:
    needs: changes
    if: ${{ needs.changes.outputs.web_landing == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-landing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-landing/package-lock.json
      - run: npm ci
      - name: eslint (advisory)
        continue-on-error: true
        run: npm run lint
      # Hard gates: types + production build must pass.
      - name: tsc --noEmit
        run: npx tsc --noEmit
      - name: next build
        run: npm run build
      - name: npm audit (advisory)
        continue-on-error: true
        run: npm audit --audit-level=high

  # ---- Web i18n catalog integrity (no-ops until 13.3/13.4 create catalogs) ----
  i18n-web:
    needs: changes
    if: ${{ needs.changes.outputs.web_dashboard == 'true' || needs.changes.outputs.web_landing == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: bash scripts/i18n-web-check.sh

  # ---- Repo-wide secret scan ----
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The MIT gitleaks binary — gitleaks-action gates organisations behind a
      # paid licence; the binary doesn't. A fresh checkout has tracked files only
      # (no build artifacts), so `--no-git` scans exactly what's public.
      - name: gitleaks (secret scan)
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --no-git --redact --no-banner

  # ---- Single required status check. `if: always()` + skipped-tolerant so
  #      path-filtered skips don't hang branch protection. Mark THIS required. ----
  ci-success:
    if: always()
    needs: [changes, android, backend, web-dashboard, web-landing, i18n-web, gitleaks]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all needed jobs succeeded or were skipped
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "job results: $results"
          for r in $results; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::a required job did not pass: $r"; exit 1 ;;
            esac
          done
          echo "all required jobs passed"
